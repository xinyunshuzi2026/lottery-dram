<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸运瑶 - 彩票自动摇号软件</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --accent-color: #f093fb;
            --text-color: #333;
            --light-bg: #f8f9fa;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --border-radius: 15px;
            --transition: all 0.3s ease;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 30px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        h1 {
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        h1 i {
            margin-right: 15px;
            font-size: 32px;
            color: var(--accent-color);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
        
        .game-selector {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        .game-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
            background: var(--primary-color);
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .game-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .game-btn:hover::before {
            left: 100%;
        }
        
        .game-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .game-btn.active {
            background: var(--secondary-color);
        }
        
        .settings-container {
            background: var(--light-bg);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        
        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .setting-item label {
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .setting-item select {
            padding: 8px 12px;
            border: 2px solid var(--primary-color);
            border-radius: 20px;
            background: white;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .setting-item select:hover {
            border-color: var(--secondary-color);
        }
        
        .result-container {
            margin: 30px 0;
        }
        
        h2 {
            color: var(--secondary-color);
            margin-bottom: 20px;
            font-size: 22px;
        }
        
        .balls-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
            min-height: 80px;
        }
        
        .ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin: 8px;
            animation: bounce 1s ease-in-out;
            position: relative;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: var(--transition);
        }
        
        .ball:hover {
            transform: scale(1.1);
        }
        
        .ball.red {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }
        
        .ball.blue {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        
        .ball.green {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
        }
        
        @keyframes bounce {
            0% {
                transform: translateY(0) scale(0);
                opacity: 0;
            }
            50% {
                transform: translateY(-20px) scale(1.1);
                opacity: 1;
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }
        
        .buttons-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
        }
        
        .btn-secondary {
            background: var(--light-bg);
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .history-container {
            margin-top: 30px;
            text-align: left;
            background: var(--light-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .history-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .history-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: white;
        }
        
        .history-item {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
            transition: var(--transition);
        }
        
        .history-item:hover {
            background: rgba(102, 126, 234, 0.05);
        }
        
        .history-item:last-child {
            border-bottom: none;
        }
        
        .history-item .time {
            font-size: 12px;
            color: #999;
            margin-right: 10px;
        }
        
        .history-item .game {
            font-weight: bold;
            color: var(--secondary-color);
            margin-right: 10px;
        }
        
        .history-item .numbers {
            display: inline-block;
        }
        
        .history-item .number {
            display: inline-block;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            font-size: 12px;
            margin-right: 4px;
            color: white;
        }
        
        .history-item .number.red {
            background: #e74c3c;
        }
        
        .history-item .number.blue {
            background: #3498db;
        }
        
        .history-item .number.green {
            background: #2ecc71;
        }
        
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        
        .theme-toggle:hover {
            transform: scale(1.1);
        }
        
        .theme-toggle i {
            font-size: 20px;
            color: var(--primary-color);
        }
        
        /* 标签页导航 */
        .tab-navigation {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
            background: var(--light-bg);
            color: var(--primary-color);
        }
        
        .tab-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .tab-btn.active {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
        }
        
        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        
        .tab-content.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 开奖号模块 */
        .draw-history-container {
            margin-top: 20px;
        }
        
        /* 数据分析模块 */
        .analysis-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }
        
        .analysis-item {
            background: var(--light-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        
        .analysis-item h3 {
            color: var(--primary-color);
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        /* 分享模块 */
        .share-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }
        
        .share-item {
            background: var(--light-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        
        .share-item h3 {
            color: var(--primary-color);
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .share-link-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .share-link-container input {
            flex: 1;
            min-width: 200px;
            padding: 10px 15px;
            border: 2px solid var(--primary-color);
            border-radius: 20px;
            font-size: 14px;
        }
        
        #qrcode-container {
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        
        .qrcode-placeholder {
            background: white;
            border: 2px solid var(--primary-color);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        .qrcode-text {
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-color);
            word-break: break-all;
        }
        
        /* 数据分析样式 */
        .frequency-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .frequency-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .frequency-count {
            font-size: 14px;
            color: var(--text-color);
        }
        
        .hot-cold-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .hot-numbers, .cold-numbers {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .hot-numbers h4, .cold-numbers h4 {
            font-size: 14px;
            color: var(--primary-color);
            margin: 0;
        }
        
        .number-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .odd-even-stats {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        
        .stat-label {
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .stat-value {
            color: var(--text-color);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .game-selector {
                flex-direction: column;
                align-items: center;
            }
            
            .game-btn {
                width: 200px;
            }
            
            .buttons-container {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 200px;
                justify-content: center;
            }
            
            .ball {
                width: 40px;
                height: 40px;
                font-size: 14px;
            }
        }
        
        /* 深色主题 */
        body.dark-theme {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #f8f9fa;
        }
        
        body.dark-theme .container {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        body.dark-theme h1,
        body.dark-theme h2,
        body.dark-theme .history-title {
            color: #f8f9fa;
        }
        
        body.dark-theme .settings-container,
        body.dark-theme .history-container {
            background: rgba(255, 255, 255, 0.05);
        }
        
        body.dark-theme .history-list {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }
        
        body.dark-theme .history-item {
            border-color: rgba(255, 255, 255, 0.1);
        }
        
        body.dark-theme .history-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        body.dark-theme .setting-item select {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #f8f9fa;
        }
        
        body.dark-theme .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            color: #f8f9fa;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle">
        <i class="fas fa-moon"></i>
    </button>
    
    <div class="container">
        <h1><i class="fas fa-lottery-alt"></i>幸运瑶 - 彩票自动摇号软件</h1>
        
        <!-- 导航标签页 -->
        <div class="tab-navigation">
            <button class="tab-btn active" data-tab="generator">摇号</button>
            <button class="tab-btn" data-tab="开奖号">开奖号</button>
            <button class="tab-btn" data-tab="analysis">数据分析</button>
            <button class="tab-btn" data-tab="share">分享</button>
        </div>
        
        <!-- 摇号模块 -->
        <div class="tab-content active" id="generator">
            <div class="game-selector">
                <button class="game-btn active" data-game="ssq">双色球</button>
                <button class="game-btn" data-game="dlt">大乐透</button>
            </div>
            
            <div class="settings-container">
                <div class="setting-item">
                    <label for="ticket-count">生成注数：</label>
                    <select id="ticket-count">
                        <option value="1">1注</option>
                        <option value="2">2注</option>
                        <option value="3">3注</option>
                        <option value="5">5注</option>
                        <option value="10">10注</option>
                    </select>
                </div>
            </div>
            
            <div class="result-container">
                <h2 id="game-title">双色球</h2>
                <div class="balls-container" id="balls-container"></div>
                <div class="buttons-container">
                    <button class="btn btn-primary" id="generate-btn">
                        <i class="fas fa-random"></i>开始摇号
                    </button>
                    <button class="btn btn-secondary" id="export-btn">
                        <i class="fas fa-download"></i>导出号码
                    </button>
                    <button class="btn btn-secondary" id="clear-history-btn">
                        <i class="fas fa-trash"></i>清空历史
                    </button>
                </div>
            </div>
            
            <div class="history-container">
                <div class="history-header">
                    <div class="history-title"><i class="fas fa-history"></i>摇号历史</div>
                </div>
                <div class="history-list" id="history-list"></div>
            </div>
        </div>
        
        <!-- 开奖号模块 -->
        <div class="tab-content" id="开奖号">
            <h2>历史开奖号</h2>
            <div class="settings-container">
                <div class="setting-item">
                    <label for="draw-count">查询期数：</label>
                    <select id="draw-count">
                        <option value="5">最近5期</option>
                        <option value="10">最近10期</option>
                        <option value="20">最近20期</option>
                        <option value="50">最近50期</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" id="fetch-draw-btn">
                <i class="fas fa-sync-alt"></i>获取开奖号
            </button>
            <div class="draw-history-container">
                <div class="history-list" id="draw-history-list"></div>
            </div>
        </div>
        
        <!-- 数据分析模块 -->
        <div class="tab-content" id="analysis">
            <h2>数据分析</h2>
            <div class="analysis-container">
                <div class="analysis-item">
                    <h3>号码频率分析</h3>
                    <div id="frequency-analysis"></div>
                </div>
                <div class="analysis-item">
                    <h3>冷热号分析</h3>
                    <div id="hot-cold-analysis"></div>
                </div>
                <div class="analysis-item">
                    <h3>奇偶比分析</h3>
                    <div id="odd-even-analysis"></div>
                </div>
            </div>
        </div>
        
        <!-- 分享模块 -->
        <div class="tab-content" id="share">
            <h2>分享软件</h2>
            <div class="share-container">
                <div class="share-item">
                    <h3>分享链接</h3>
                    <div class="share-link-container">
                        <input type="text" id="share-link" readonly>
                        <button class="btn btn-secondary" id="copy-link-btn">
                            <i class="fas fa-copy"></i>复制
                        </button>
                    </div>
                </div>
                <div class="share-item">
                    <h3>二维码</h3>
                    <div id="qrcode-container"></div>
                </div>
                <div class="share-item">
                    <h3>分享说明</h3>
                    <p>将上面的链接或二维码分享给朋友，他们可以直接访问本软件。</p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="lucky.js"></script>
</body>
</html>
